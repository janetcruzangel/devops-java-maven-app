version: '3.8'
services:
  java-maven-app:
    # image: janetcruzangel/demo-app:java-maven-1.0
    # use the shell env variable to set the image name at runtime instead of hard-coding it like above line
    image: ${IMAGE}
    ports:
      - 8080:8080
  postgres:
    image: postgres:15
    ports:
      - 5432:5432
    environment:
      # environment variables list can be found in the image documentation
      - POSTGRES_PASSWORD=my-pwd #can be set o any wanted value
